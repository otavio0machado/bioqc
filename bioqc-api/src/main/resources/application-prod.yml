spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    baseline-on-migrate: true

management:
  health:
    mail:
      enabled: false

app:
  auth:
    refresh-cookie:
      secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
      same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:None}
